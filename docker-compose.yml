services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-payment_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${BROKER_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${BROKER_PASSWORD:-admin}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: payment-service
    pull_policy: build
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-payment_db}
      BROKER_HOST: rabbitmq
      BROKER_USER: ${BROKER_USER:-admin}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-admin}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "payment_processing.api.main:main", "--factory", "--host", "0.0.0.0", "--port", "8000"]

  migrate:
    build: .
    image: payment-service
    pull_policy: build
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-payment_db}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    command: ["uv", "run", "alembic", "upgrade", "head"]

  consumer:
    build: .
    image: payment-service
    pull_policy: build
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-payment_db}
      BROKER_HOST: rabbitmq
      BROKER_USER: ${BROKER_USER:-admin}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["uv", "run", "faststream", "run", "payment_processing.infrastructure.broker.consumer:main", "--factory", "--workers", "${PAYMENT_CONSUMER_WORKERS:-1}"]

  producer:
    build: .
    image: payment-service
    pull_policy: build
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-payment_db}
      BROKER_HOST: rabbitmq
      BROKER_USER: ${BROKER_USER:-admin}
      BROKER_PASSWORD: ${BROKER_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["uv", "run", "faststream", "run", "payment_processing.infrastructure.broker.producer:main", "--factory", "--workers", "${OUTBOX_PRODUCER_WORKERS:-1}"]

volumes:
  postgres_data:
  rabbitmq_data: